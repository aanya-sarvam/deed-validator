services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: deeds
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change-me}
      POSTGRES_DB: deeds
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deeds"]
      interval: 5s
      retries: 10

  app:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://deeds:${DB_PASSWORD:-change-me}@db:5432/deeds
      SARVAM_API_KEY: ${SARVAM_API_KEY:-}
      DIGITIZE_LANG: ${DIGITIZE_LANG:-od-IN}
    volumes:
      - ./static/scans:/app/static/scans
      - ./data:/app/data:ro
    ports:
      - "8000:8000"   # put nginx with TLS in front for production; see README

volumes:
  pgdata:
